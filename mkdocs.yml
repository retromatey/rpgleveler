site_name: rpgleveler
site_description: Basic Fantasy RPG character leveling tool
site_url: https://retromatey.github.io/rpgleveler/

repo_url: https://github.com/retromatey/rpgleveler
repo_name: retromatey/rpgleveler

theme:
  name: material
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.top

  palette:

    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/retromatey/rpgleveler
      name: GitHub

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - macros:
      module_name: docs_macros
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI Usage: cli.md
  - Character Leveling: character-leveling.md
  - Character Schema: character-schema.md
  - API Reference:
      - Overview: api/index.md
      - Core:
          - Character: api/core/character.md
          - ClassNames: api/core/class_names.md
          - LevelUpResult: api/core/level_up_result.md
          - Races: api/core/races.md
          - SavingThrowData: api/core/saving_throw_data.md
          - SpellSlots: api/core/spell_slots.md
          - ThiefSkills: api/core/thief_skills.md
          - TurnUndead: api/core/turn_undead.md
      - Engine:
          - Advancement: api/engine/advancement.md
          - Leveler: api/engine/leveler.md
      - IO:
          - Character IO: api/io/character_io.md

  - Development: development.md

