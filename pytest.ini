[pytest]
testpaths = tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: fast isolated tests
    integration: slower tests that exercise multiple components

addopts =
    #-m "not integration"
    -ra
    --strict-markers
    #--maxfail=1
    --cov=rpgleveler
    --cov-report=term-missing
